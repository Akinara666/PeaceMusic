services:
  peacemusic:
    build: .
    image: ghcr.io/akinara666/peacemusic:latest
    init: true
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # Ротация логов, чтобы не забить весь диск
        max-file: "3"
    env_file:
      - .env
    extra_hosts:
      # Linux Docker Engine does not create this name automatically. host-gateway
      # keeps bridge networking while allowing access to host services (e.g. xray).
      - "host.docker.internal:host-gateway"
    environment:
      CHAT_MEMORY_DB: /app/data/chat_memory.sqlite3
      MUSIC_DIRECTORY: /app/music_files
      BOT_PROMPT_FILE: /app/config/prompt.txt
      # The host path is selected separately below; the app always sees this path.
      YTDL_COOKIE_FILE: /app/config/cookies.txt
    volumes:
      - music_files:/app/music_files
      - app_data:/app/data
      # Override BOT_PROMPT_HOST_FILE in .env to use a custom host-side prompt.
      - ${BOT_PROMPT_HOST_FILE:-./utils/default_prompt.txt}:/app/config/prompt.txt:ro
      # Keep authentication cookies on the host. The placeholder makes cookies
      # optional; when enabled, YTDL_COOKIE_HOST_FILE must point to a real file.
      - ${YTDL_COOKIE_HOST_FILE:-./utils/empty_cookies.txt}:/app/config/cookies.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  music_files:
  app_data:
