services:
  peacemusic:
    build: .
    image: ghcr.io/akinara666/peacemusic:latest
    init: true
    restart: unless-stopped
    mem_limit: 1g
    cpus: 2.0
    pids_limit: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # Ротация логов, чтобы не забить весь диск
        max-file: "3"
    env_file:
      - .env
    environment:
      CHAT_MEMORY_DB: /app/data/chat_memory.sqlite3
      MUSIC_DIRECTORY: /app/music_files
    volumes:
      - music_files:/app/music_files
      - app_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  music_files:
  app_data:
